
worker_processes auto;
error_log /var/log/nginx/error.log debug;

events {}
http {

  resolver 127.0.0.11 valid=60s ipv6=off;

  # This is required to proxy Grafana Live WebSocket connections.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # MCP Authorization
  map $http_authorization $mcp_auth {
    default 1;
    "Bearer domino4ever" 1;
  }

  upstream grafana {
    zone grafana 64k;
    server grafana:3000 resolve;
  }

  upstream grafana-mcp {
    zone grafana_mcp 64k;
    server grafana-mcp:8000 resolve;
  }

  server {
    listen            443 ssl;
    listen       [::]:443 ssl;
    server_name  _;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Prefer the SSL ciphers for ECDSA:
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256';

    ssl_certificate     /certs/cert.pem;
    ssl_certificate_key /certs/key.pem;

    # SSL session handling
    ssl_session_timeout 2h;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    http2 on;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
      proxy_set_header Host $host;
      proxy_pass http://grafana;
    }

    # Proxy Grafana Live WebSocket connections.
    location /api/live/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_pass http://grafana;
    }
  }

  server {
    listen            8443 ssl;
    listen       [::]:8443 ssl;
    server_name  _;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Prefer the SSL ciphers for ECDSA:
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256';

    ssl_certificate     /certs/cert.pem;
    ssl_certificate_key /certs/key.pem;

    # SSL session handling
    ssl_session_timeout 2h;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    http2 on;

    proxy_buffering off;

    if ($mcp_auth = 0) {
        return 401;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host localhost:8000;

      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_pass http://grafana-mcp;
    }

  }

}
