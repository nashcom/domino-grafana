x-no-proxy: &no-proxy
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  NO_PROXY: ""
  http_proxy: ""
  https_proxy: ""
  no_proxy: ""

services:

  grafana:

    image: grafana/grafana-enterprise
    container_name: grafana
    hostname: grafana
    restart: always
    stop_grace_period: 15s

    environment:
      NO_PROXY: localhost,127.0.0.1,grafana,prometheus
      no_proxy: localhost,127.0.0.1,grafana,prometheus

      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "${GF_SMTP_HOST:-mail.example.com:25}"
      GF_SMTP_FROM_ADDRESS: "${GF_SMTP_FROM_ADDRESS:-grafana}"
      GF_SMTP_FROM_NAME: "${GF_SMTP_FROM_NAME:-Grafana}"
      GF_SMTP_EHLO_IDENTITY: "${GF_SMTP_EHLO_IDENTITY:-grafana}"
      GF_SMTP_STARTTLS_POLICY: "${GF_SMTP_STARTTLS_POLICY:-MandatoryStartTLS}"
      GF_SERVER_ROOT_URL: "$GF_SERVER_ROOT_URL"

    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:z
      - grafana-data:/var/lib/grafana

    networks:
      - grafana_net

  prometheus:

    image: prom/prometheus
    container_name: prometheus
    hostname: prometheus
    restart: always
    stop_grace_period: 15s

    environment: *no-proxy

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROM_RETENTION_TIME:-30d}'
      - '--storage.tsdb.retention.size=${PROM_RETENTION_SIZE:-200GB}'

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:z
      - ./alerts.yml:/etc/prometheus/alerts.yml:z
      - prometheus-data:/prometheus

    ports:
      - "${PROM_BIND:-127.0.0.1}:${PROM_BIND_PORT:-9090}:9090"

    networks:
      - grafana_net

  alertmanager:

    image: prom/alertmanager
    container_name: alertmanager
    hostname: alertmanager

    profiles:
      - alertmanger 
    depends_on:
      - prometheus

    restart: always
    stop_grace_period: 15s

    environment: *no-proxy

    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--data.retention=${ALERTMANAGER_RETENTION:-120h}'

    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:z
      - alertmanager-data:/alertmanager

    ports:
      - "${ALERTMANAGER_BIND:-127.0.0.1}:${ALERTMANAGER_PORT:-9093}:9093"

    networks:
      - grafana_net

  blackbox-exporter:

    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    hostname: blackbox-exporter

    restart: always
    stop_grace_period: 15s

    environment: *no-proxy

    cap_add:
      - NET_RAW

    ports:
      - "${BLACKBOX_BIND:-127.0.0.1}:${BLACKBOX_PORT:-9115}:9115"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9115/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - grafana_net

  grafana-mcp:
    image: grafana/mcp-grafana:latest
    container_name: grafana-mcp
    profiles:
      - mcp

    restart: always

    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GF_MCP_TOKEN}

    command:
      - -t
      - streamable-http

    depends_on:
      - grafana

    networks:
      - grafana_net

  loki:
    image: grafana/loki:latest
    container_name: loki
    profiles:
      - loki

    environment: *no-proxy

    volumes:
      - ./loki-config.yml:/loki-config.yml:z
      - loki-data:/tmp/loki

    command: -config.file=/loki-config.yml

    networks:
      - grafana_net

  nginx:

    image: nginx
    container_name: grafana-nginx
    hostname: grafana-nginx
    restart: always
    stop_grace_period: 15s
    depends_on:
      - grafana
      - prometheus

    ports:
      - 3000:443
      - 8443:8443

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:z
      - ./certs:/certs:z

    networks:
      - grafana_net

  nginx-loki:

    image: nginx
    container_name: loki-nginx
    hostname: loki-nginx

    profiles:
      - loki-nginx
    depends_on:
      - loki

    restart: always
    stop_grace_period: 15s
    ports:
      - 3101:443

    volumes:
      - ./nginx_loki.conf:/etc/nginx/nginx.conf:z
      - ./certs:/certs:z

    networks:
      - grafana_net

volumes:

  grafana-data:
    external: false

  prometheus-data:
    external: false

  alertmanager-data:
    external: false

  loki-data:
    external: false

networks:

  grafana_net:
    name: grafana_net
    driver: bridge
